<button
  type="button"
  role="combobox"
  class="cngx-tab-overflow__trigger"
  cngxActiveDescendant
  [items]="templates.adItems()"
  [cngxPopoverTrigger]="overflowPopover"
  [haspopup]="'listbox'"
  [hidden]="!hasHiddenTabs()"
  [attr.aria-label]="i18n.moreTabsLabel(hiddenCount())"
  (activated)="handleAdActivated($event)"
  (keydown)="handleTriggerKeydown($event)"
  (click)="overflowPopover.toggle()"
>
  @let triggerTpl = templates.triggerTemplate();
  @if (triggerTpl) {
    <ng-container
      *ngTemplateOutlet="triggerTpl; context: templates.triggerContext()"
    />
  } @else {
    {{ i18n.moreTabsLabel(hiddenCount()) }}
  }
</button>

<div
  cngxPopover
  #overflowPopover="cngxPopover"
  role="listbox"
  class="cngx-tab-overflow__panel"
  placement="bottom-end"
  panelClass="cngx-tab-overflow__panel-surface"
  [attr.aria-label]="i18n.moreTabsLabel(hiddenCount())"
>
  <!--
    `role="presentation"` flattens the <ul> away from the
    accessibility tree so each <li role="option"> is exposed as a
    direct child of the role="listbox" landmark on the popover
    surface. Each option carries a stable id derived from the tab
    handle id; CngxActiveDescendant on the trigger button steers
    `aria-activedescendant` at one of these ids while the user
    navigates with ArrowUp/Down/Home/End/typeahead. ARIA 1.2
    combobox: trigger button (role="combobox") owns focus + AD;
    popover surface (role="listbox") is the popup target.
  -->
  <ul class="cngx-tab-overflow__list" role="presentation">
    @for (tab of hiddenTabs(); track tab.id; let i = $index) {
      <li
        role="option"
        class="cngx-tab-overflow__item"
        [id]="adItemId(tab)"
        [attr.data-tab-id]="tab.id"
        [attr.aria-selected]="false"
        [attr.aria-disabled]="tab.disabled() ? 'true' : 'false'"
        (click)="!tab.disabled() && pickTab(tab)"
      >
        @let itemTpl = templates.itemTemplate();
        @if (itemTpl) {
          <ng-container
            *ngTemplateOutlet="itemTpl; context: templates.buildItemContext(tab, i)"
          />
        } @else {
          {{ tab.label() ?? tab.id }}
        }
      </li>
    }
  </ul>
</div>
