<button
  type="button"
  class="cngx-tab-overflow__trigger"
  cngxActiveDescendant
  #ad="cngxActiveDescendant"
  [items]="templates.adItems()"
  [cngxPopoverTrigger]="overflowPopover"
  [haspopup]="'menu'"
  [hidden]="!hasHiddenTabs()"
  [attr.aria-label]="i18n.moreTabsLabel(hiddenCount())"
  (activated)="handleAdActivated($event)"
  (keydown)="handleTriggerKeydown($event)"
  (click)="overflowPopover.toggle()"
>
  @let triggerTpl = templates.triggerTemplate();
  @if (triggerTpl) {
    <ng-container
      *ngTemplateOutlet="triggerTpl; context: templates.triggerContext()"
    />
  } @else {
    {{ i18n.moreTabsLabel(hiddenCount()) }}
  }
</button>

<div
  cngxPopover
  #overflowPopover="cngxPopover"
  cngxClickOutside
  [eventType]="'click'"
  [enabled]="overflowPopover.isVisible()"
  (clickOutside)="overflowPopover.hide()"
  role="menu"
  class="cngx-tab-overflow__panel"
  placement="bottom-end"
  panelClass="cngx-tab-overflow__panel-surface"
  [attr.aria-label]="i18n.moreTabsLabel(hiddenCount())"
>
  <!--
    `role="presentation"` flattens the <ul> away from the
    accessibility tree so each <li role="menuitem"> is exposed as a
    direct child of the role="menu" landmark on the popover surface.
    Each item carries a stable id derived from the tab handle id;
    CngxActiveDescendant on the trigger steers `aria-activedescendant`
    at one of these ids while the user navigates with
    ArrowUp/Down/Home/End/typeahead. The popover is a quick-jump
    navigation surface — selecting an item triggers `selectById`,
    not a value commit — so menu/menuitem is the spec-correct pattern
    (listbox/option carries `aria-selected` semantics that do not
    apply to a transient navigation popup).
  -->
  <ul class="cngx-tab-overflow__list" role="presentation">
    @for (tab of hiddenTabs(); track tab.id; let i = $index) {
      <li
        role="menuitem"
        class="cngx-tab-overflow__item"
        [class.cngx-tab-overflow__item--active]="ad.activeId() === adItemId(tab)"
        [id]="adItemId(tab)"
        [attr.data-tab-id]="tab.id"
        [attr.aria-disabled]="tab.disabled() ? 'true' : 'false'"
        (click)="!tab.disabled() && pickTab(tab)"
      >
        @let itemTpl = templates.itemTemplate();
        @if (itemTpl) {
          <ng-container
            *ngTemplateOutlet="itemTpl; context: templates.buildItemContext(tab, i)"
          />
        } @else {
          {{ tab.label() ?? tab.id }}
        }
      </li>
    }
  </ul>
</div>
