<nav cngxBreadcrumb [maxVisible]="maxVisible()" [label]="label()" #bc="cngxBreadcrumb">
  <ol class="cngx-breadcrumb__list">
    @for (crumb of items(); track crumb; let last = $last) {
      <li class="cngx-breadcrumb__crumb" [style.display]="bc.isCollapsed(crumbRef) ? 'none' : null">
        <a
          cngxBreadcrumbItem
          #crumbRef="cngxBreadcrumbItem"
          class="cngx-breadcrumb__link"
          [attr.href]="last ? null : (crumb.href ?? null)"
          >{{ crumb.label }}</a
        >
      </li>
      @if (!last) {
        <li
          cngxBreadcrumbSeparator
          class="cngx-breadcrumb__separator"
          [style.display]="bc.isCollapsed(crumbRef) ? 'none' : null"
        >
          /
        </li>
      }
    }
  </ol>
</nav>
