@if (paginate.isBusy()) {
  @if (loadingTemplate(); as tpl) {
    <ng-container [ngTemplateOutlet]="tpl" />
  } @else {
    <cngx-progress
      class="cngx-paginator__progress"
      variant="linear"
      [state]="paginate.state()"
      [label]="config.announcements.loading"
    />
  }
}

<ng-content />

<span cngxLiveRegion class="cngx-paginator__sr">{{ announcer.message() }}</span>
