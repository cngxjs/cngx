<!--
  `cngx-mat-stepper--header-static` marks the 'none' policy so consumers
  can style the inert headers (e.g. `cursor: default`); the actual
  click / key suppression runs as a capture-phase listener on the host.
-->
<mat-stepper
  [orientation]="matOrientation()"
  [linear]="presenter.linear()"
  [class.cngx-mat-stepper--header-static]="resolvedHeaderNavigation() === 'none'"
>
  @for (node of stepsOnly(); track node.id) {
    <mat-step
      [completed]="isCompleted(node)"
      [hasError]="hasError(node)"
      [editable]="isEditable(node)"
    >
      <ng-template matStepLabel>
        @let labelTpl = labelTemplateFor(node.id);
        @if (labelTpl) {
          <ng-container
            *ngTemplateOutlet="labelTpl; context: stepLabelContextFor(node)"
          ></ng-container>
        } @else {
          <span [attr.data-step-depth]="stepDepth(node)">{{ stepLabel(node) }}</span>
        }
      </ng-template>
      @let contentTpl = contentTemplateFor(node.id);
      @if (contentTpl) {
        <ng-container
          *ngTemplateOutlet="contentTpl; context: stepContentContextFor(node)"
        ></ng-container>
      }
    </mat-step>
  }
</mat-stepper>

<!-- Footer slot - instruments the Material twin via CNGX_STEPPER_HOST. -->
<ng-content select="cngx-stepper-footer, [cngxStepperFooter]"></ng-content>
