<div class="cngx-dot-stepper__row">
  @for (i of dotIndices(); track i) {
    <span
      class="cngx-dot-stepper__dot"
      role="presentation"
      [class.cngx-dot-stepper__dot--active]="isActive(i)"
      [class.cngx-dot-stepper__dot--completed]="i < activeIndex()"
      [attr.aria-current]="isActive(i) ? 'step' : null"
      [attr.aria-label]="ariaLabelFor(i)"
      [attr.data-state]="stateFor(i)"
    ></span>
  }
</div>
