<div role="heading" [attr.aria-level]="group.headingLevel()" class="cngx-accordion-item__heading">
  <span class="cngx-accordion-item__leading" aria-hidden="true">
    <ng-content select="[cngxAccordionItemLeading]" />
  </span>
  <button
    type="button"
    cngxAccordionPanel
    class="cngx-accordion-item__header"
    [panelId]="panelId()"
    [controls]="regionId"
    [disabled]="disabled()"
    [id]="headerId"
    [attr.aria-labelledby]="titleId"
    [attr.aria-describedby]="describedBy"
  >
    <span class="cngx-accordion-item__text">
      <span class="cngx-accordion-item__title" [id]="titleId">
        <ng-content select="[cngxAccordionItemTitle]" />
      </span>
      <span
        class="cngx-accordion-item__subtitle"
        [id]="subtitleId"
        [attr.aria-hidden]="subtitleSlot() ? null : 'true'"
      >
        <ng-content select="[cngxAccordionItemSubtitle]" />
      </span>
    </span>
    <span class="cngx-accordion-item__chevron-slot" aria-hidden="true">
      @if (iconTemplate(); as icon) {
        <ng-container
          [ngTemplateOutlet]="icon"
          [ngTemplateOutletContext]="{ $implicit: expanded() }"
        />
      } @else {
        <span class="cngx-accordion-item__chevron"></span>
      }
    </span>
  </button>
  <span class="cngx-accordion-item__meta">
    <ng-content select="[cngxAccordionItemMeta]" />
  </span>
</div>

<span [id]="reasonId" class="cngx-visually-hidden" [attr.aria-hidden]="!disabled()">
  @if (disabled()) {
    {{ disabledReason() }}
  }
</span>

<div
  role="region"
  class="cngx-accordion-item__region"
  [id]="regionId"
  [attr.aria-labelledby]="titleId"
  [hidden]="!expanded()"
>
  @if (contentSlot(); as content) {
    @if (hasOpened()) {
      <ng-container [ngTemplateOutlet]="content.templateRef" />
    }
  } @else {
    <ng-content />
  }
</div>
