<cngx-select-panel-shell
  [actionFocusTrapEnabled]="viewHost.actionFocusTrapEnabled?.() ?? false"
  [actionPosition]="viewHost.actionPosition?.() ?? 'bottom'"
>
  <div
    #treeContainer
    role="tree"
    aria-multiselectable="true"
    cngxActiveDescendant
    #ad="cngxActiveDescendant"
    [items]="adItems()"
    [autoHighlightFirst]="true"
    [cngxHierarchicalNav]="host.treeController"
    (keydown.enter)="handleActivate($event, ad)"
    (keydown.space)="handleActivate($event, ad)"
    (keydown.escape)="handleEscape($event)"
    tabindex="0"
    class="cngx-tree-select__tree"
  >
    @for (node of host.treeController.visibleNodes(); track node.id) {
      @if (host.nodeTpl(); as slot) {
        <ng-container *ngTemplateOutlet="slot; context: nodeContext(node)" />
      } @else {
        <div
          role="treeitem"
          [attr.id]="node.id"
          [attr.aria-level]="node.depth + 1"
          [attr.aria-posinset]="node.posinset"
          [attr.aria-setsize]="node.setsize"
          [attr.aria-expanded]="
            node.hasChildren ? host.treeController.isExpanded(node.id)() : null
          "
          [attr.aria-selected]="host.isSelected(node.value)"
          [attr.aria-disabled]="node.disabled ? 'true' : null"
          [style.--cngx-tree-depth]="node.depth"
          class="cngx-tree-select__node"
          (click)="!node.disabled && host.handleSelect(node)"
        >
          @if (node.hasChildren) {
            @let isOpen = host.treeController.isExpanded(node.id)();
            <button
              type="button"
              class="cngx-tree-select__twisty"
              [class.cngx-tree-select__twisty--open]="isOpen"
              tabindex="-1"
              [attr.aria-label]="isOpen ? host.twistyCollapseLabel() : host.twistyExpandLabel()"
              (click)="toggleExpand($event, node)"
            >
              @if (isOpen) {
                @if (host.twistyOpenGlyph(); as glyph) {
                  <ng-container *ngTemplateOutlet="glyph" />
                } @else if (host.twistyGlyph(); as glyph) {
                  <ng-container *ngTemplateOutlet="glyph" />
                } @else {
                  <span aria-hidden="true">▸</span>
                }
              } @else {
                @if (host.twistyGlyph(); as glyph) {
                  <ng-container *ngTemplateOutlet="glyph" />
                } @else {
                  <span aria-hidden="true">▸</span>
                }
              }
            </button>
          } @else {
            <span aria-hidden="true" class="cngx-tree-select__twisty-spacer"></span>
          }
          <!-- Tree-select hard-codes checkbox-indicator;
               'radio' / 'checkmark' from selectionIndicatorVariant
               are flat-panel-only. Note: select-family-accepted-debt. -->
          <cngx-checkbox-indicator
            [checked]="host.isSelected(node.value)"
            [indeterminate]="host.isIndeterminate(node.value)"
            [checkGlyph]="host.checkGlyph()"
            [dashGlyph]="host.dashGlyph()"
          />
          <span class="cngx-tree-select__label">{{ node.label }}</span>
        </div>
      }
    }
  </div>
</cngx-select-panel-shell>
