name: Deploy Compodoc

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    env:
      # Public URL where the examples app will be served from after this
      # deploy. Consumed by scripts/backport-example-urls.mjs so the
      # <example-url> tags rendered into the compodocx Examples tab point at
      # the live production iframes (not localhost:4200).
      EXAMPLES_BASE_URL: https://cngxjs.github.io/cngx/examples

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate examples + backport <example-url> tags (prod URLs)
        run: |
          node scripts/examples-gen/index.mjs
          node scripts/backport-example-urls.mjs

      - name: Build Docs
        run: npm run docs

      - name: Build Examples App
        run: |
          npx ng build examples --configuration production --base-href /cngx/examples/ --deploy-url /cngx/examples/ --output-path docs/examples
          mv docs/examples/browser/* docs/examples/
          rm -rf docs/examples/browser

      - name: Disable Jekyll
        run: touch docs/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
